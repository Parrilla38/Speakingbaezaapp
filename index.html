<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Speaking · Academia de Baeza</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    /* ── Paleta Guardia Civil-inspired ── */
    --m-bg:        #f3eddc;         /* papel crema cálido */
    --m-bg-2:      #ebe3cc;         /* crema más profundo */
    --m-surface:   #ffffff;
    --m-card:      #faf5e8;
    --m-ink:       #0f1411;
    --m-ink-2:     rgba(15,20,17,.74);
    --m-muted:     rgba(15,20,17,.55);
    --m-line:      rgba(15,20,17,.10);
    --m-line-strong: rgba(15,20,17,.20);

    --m-accent:    #1f3a26;         /* verde benemérito */
    --m-accent-2:  #16291a;         /* verde profundo */
    --m-gold:      #b8924a;         /* dorado */
    --m-gold-2:    #d4ad60;         /* dorado claro */
    --m-burgundy:  #6b1f1f;         /* granate sobrio */

    --m-font-display: "Fraunces", "Times New Roman", serif;
    --m-font-ui:      "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --m-font-mono:    "JetBrains Mono", ui-monospace, Menlo, monospace;

    /* Legacy bridges */
    --olive: var(--m-accent);
    --olive-2: var(--m-accent-2);
    --gold:  var(--m-gold);
    --gold-2: var(--m-gold-2);
    --paper: var(--m-bg);
    --paper-2: var(--m-bg-2);
    --paper-3: #e0d6b8;
    --cream: var(--m-card);
    --ink:   var(--m-ink);
    --ink-2: var(--m-ink-2);
    --olive-soft: var(--m-muted);
    --line: var(--m-line);
    --line-strong: var(--m-line-strong);
    --font-display: var(--m-font-display);
    --font-ui:      var(--m-font-ui);
    --font-mono:    var(--m-font-mono);
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family: var(--m-font-ui);
    background: var(--m-bg);
    color: var(--m-ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01";
    overflow-x:hidden;
  }
  button{ font-family: inherit; }

  /* Sutil textura de papel — visible pero no ruidosa */
  body::before{
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(rgba(15,20,17,.022) 1px, transparent 1px),
      radial-gradient(rgba(15,20,17,.014) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    opacity: .7;
    mix-blend-mode: multiply;
  }

  /* Layout */
  .m-container{
    position: relative; z-index: 1;
    width: min(1100px, 100% - 48px);
    margin: 0 auto;
  }
  @media (max-width: 640px){
    .m-container{ width: calc(100% - 28px); }
  }

  .fade-enter{ animation: fadeIn .4s ease both; }
  @keyframes fadeIn{ from{opacity:0; transform: translateY(8px);} to{opacity:1; transform:none;} }

  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: rgba(15,20,17,.16); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background: rgba(15,20,17,.30); }
  ::selection{ background: var(--m-accent); color: var(--m-bg); }

  /* ── Tipografía utilitaria ── */
  .m-mono{ font-family: var(--m-font-mono); letter-spacing: .04em; }
  .m-eyebrow{
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--m-font-mono);
    font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--m-muted);
  }
  .m-dot{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--m-gold);
    box-shadow: 0 0 0 4px rgba(184,146,74,.16);
  }
  .m-rule{
    display: inline-block; height: 1px; background: var(--m-line-strong);
    flex: 1; max-width: 56px;
  }

  /* ── Hero ─────────────────────────────────────── */
  .m-hero-h1{
    font-family: var(--m-font-display);
    font-weight: 350;
    font-size: clamp(48px, 11vw, 128px);
    line-height: .94;
    letter-spacing: -.025em;
    margin: 0;
    color: var(--m-ink);
    text-wrap: balance;
  }
  .m-hero-h1 em{
    font-style: italic;
    color: var(--m-accent);
    font-weight: 400;
  }
  .m-hero-flourish{
    color: var(--m-gold);
    font-family: var(--m-font-display);
    font-style: italic;
  }

  /* ── Mode cards (más atractivos, con personalidad) ── */
  .m-mode{
    position: relative;
    display: flex; align-items: stretch; gap: 0;
    width: 100%;
    background: var(--m-card);
    border: 1px solid var(--m-line);
    cursor: pointer;
    text-align: left;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    font-family: var(--m-font-ui);
    overflow: hidden;
    padding: 0;
  }
  .m-mode + .m-mode{ margin-top: -1px; }
  .m-mode:hover{
    border-color: var(--m-accent);
    z-index: 2;
    box-shadow: 0 12px 32px -16px rgba(15,20,17,.18);
  }
  .m-mode.primary{
    background: var(--m-accent);
    color: var(--m-bg);
    border-color: var(--m-accent);
  }
  .m-mode.primary:hover{
    background: var(--m-accent-2);
    border-color: var(--m-accent-2);
  }

  .m-mode-rail{
    flex: 0 0 76px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 22px 0;
    border-right: 1px solid var(--m-line);
    background: rgba(15,20,17,.02);
  }
  .m-mode.primary .m-mode-rail{
    border-right-color: rgba(255,255,255,.16);
    background: rgba(0,0,0,.14);
  }
  .m-mode-rail .num{
    font-family: var(--m-font-display);
    font-size: 36px; font-weight: 350;
    line-height: 1;
    color: var(--m-gold);
    letter-spacing: -.02em;
  }
  .m-mode-rail .glyph{ opacity: .55; color: inherit; }

  .m-mode-body{
    flex: 1; min-width: 0;
    padding: 26px 28px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .m-mode-kicker{
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--m-gold);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .m-mode.primary .m-mode-kicker{ color: var(--m-gold-2); }
  .m-mode-title{
    font-family: var(--m-font-display);
    font-size: clamp(26px, 3.6vw, 38px); font-weight: 400; letter-spacing: -.015em;
    line-height: 1.05;
    color: inherit;
  }
  .m-mode-title em{ font-style: italic; color: var(--m-gold); }
  .m-mode.primary .m-mode-title em{ color: var(--m-gold-2); }
  .m-mode-sub{
    font-size: 14.5px; line-height: 1.5;
    color: var(--m-ink-2);
    max-width: 56ch;
  }
  .m-mode.primary .m-mode-sub{ color: rgba(255,255,255,.78); }
  .m-mode-meta{
    margin-top: 6px;
    display: flex; gap: 16px; flex-wrap: wrap;
    font-family: var(--m-font-mono); font-size: 10.5px;
    letter-spacing: .18em; text-transform: uppercase;
    color: var(--m-muted);
  }
  .m-mode.primary .m-mode-meta{ color: rgba(255,255,255,.55); }
  .m-mode-meta span:not(:first-child){ position: relative; padding-left: 16px; }
  .m-mode-meta span:not(:first-child)::before{
    content:''; position: absolute; left: 0; top: 50%;
    width: 4px; height: 4px; border-radius: 50%;
    background: currentColor; opacity: .5; transform: translateY(-50%);
  }

  .m-mode-cta{
    flex: 0 0 64px;
    display: flex; align-items: center; justify-content: center;
    border-left: 1px solid var(--m-line);
    color: var(--m-ink);
    transition: background .2s ease;
  }
  .m-mode.primary .m-mode-cta{
    border-left-color: rgba(255,255,255,.16);
    color: var(--m-gold-2);
  }
  .m-mode:hover .m-mode-cta{ background: var(--m-gold); color: var(--m-accent-2); }
  .m-mode.primary:hover .m-mode-cta{ background: var(--m-gold); color: var(--m-accent-2); }

  @media (max-width: 640px){
    .m-mode-rail{ flex-basis: 56px; padding: 16px 0; }
    .m-mode-rail .num{ font-size: 26px; }
    .m-mode-body{ padding: 20px 18px; }
    .m-mode-cta{ flex-basis: 48px; }
  }

  /* ── Session card (cadete-lite, elegante) ─────── */
  .m-session{
    margin-top: 40px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 0;
    background: var(--m-accent);
    color: var(--m-bg);
    border: 1px solid var(--m-accent);
    position: relative;
    overflow: hidden;
  }
  .m-session::before{
    content:''; position: absolute; right: -40px; top: -40px;
    width: 280px; height: 280px;
    background-image: repeating-linear-gradient(135deg, rgba(255,255,255,.04) 0 1px, transparent 1px 14px);
    pointer-events: none;
  }
  .m-session-pane{
    padding: 28px 30px;
    position: relative;
    z-index: 1;
  }
  .m-session-pane + .m-session-pane{
    border-left: 1px solid rgba(255,255,255,.14);
  }
  .m-session-eyebrow{
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .24em; text-transform: uppercase;
    color: rgba(255,255,255,.55);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .m-session-greet{
    font-family: var(--m-font-display);
    font-size: clamp(34px, 5vw, 52px);
    line-height: 1.0; letter-spacing: -.02em;
    margin: 10px 0 0;
    font-weight: 350;
  }
  .m-session-greet em{ font-style: italic; color: var(--m-gold-2); }
  .m-session-bar{
    margin-top: 22px;
    height: 4px; background: rgba(255,255,255,.12);
    position: relative; overflow: hidden;
  }
  .m-session-bar > span{
    position: absolute; inset: 0; width: var(--p,0%);
    background: linear-gradient(90deg, var(--m-gold) 0%, var(--m-gold-2) 100%);
  }
  .m-session-bar-meta{
    margin-top: 8px;
    display: flex; justify-content: space-between;
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase;
    color: rgba(255,255,255,.62);
  }
  .m-session-bar-meta .v{ color: var(--m-gold-2); }

  .m-stat-row{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .m-stat{
    display: flex; flex-direction: column; gap: 4px;
  }
  .m-stat-k{
    font-family: var(--m-font-display); font-weight: 350;
    font-size: 56px; line-height: 1; letter-spacing: -.02em;
    color: var(--m-gold-2);
    font-variant-numeric: tabular-nums;
  }
  .m-stat-l{
    font-family: var(--m-font-mono);
    font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: rgba(255,255,255,.62);
  }
  .m-streak-dots{
    display: flex; gap: 5px; margin-top: 10px;
  }
  .m-streak-dots > span{
    width: 22px; height: 22px;
    border: 1px solid rgba(255,255,255,.22);
    display: inline-flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.4);
  }
  .m-streak-dots > span.ok{
    background: var(--m-gold);
    color: var(--m-accent-2);
    border-color: var(--m-gold);
  }

  @media (max-width: 820px){
    .m-session{ grid-template-columns: 1fr; }
    .m-session-pane + .m-session-pane{
      border-left: none; border-top: 1px solid rgba(255,255,255,.14);
    }
  }

  /* ── Section label ─────────────────────────── */
  .m-section-label{
    display: flex; align-items: center; gap: 14px;
    font-family: var(--m-font-mono);
    font-size: 11px; letter-spacing: .24em; text-transform: uppercase;
    color: var(--m-muted);
    margin-bottom: 18px;
  }
  .m-section-label .n{ color: var(--m-gold); }
  .m-section-label .line{ flex: 0 0 28px; height: 1px; background: var(--m-line-strong); }

  /* ── Ephemerides (efeméride del día) ─────── */
  .m-eph{
    margin-top: 72px;
    border-top: 1px solid var(--m-line-strong);
    padding-top: 56px;
    position: relative;
  }
  .m-eph-grid{
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 48px;
    align-items: start;
  }
  .m-eph-date{
    position: sticky; top: 96px;
  }
  .m-eph-day{
    font-family: var(--m-font-display);
    font-size: clamp(80px, 12vw, 140px);
    line-height: .9; letter-spacing: -.04em;
    color: var(--m-accent);
    font-weight: 350;
    font-variant-numeric: tabular-nums;
  }
  .m-eph-month{
    font-family: var(--m-font-mono);
    font-size: 11px; letter-spacing: .28em; text-transform: uppercase;
    color: var(--m-muted);
    margin-top: 8px;
  }
  .m-eph-year{
    margin-top: 6px;
    font-family: var(--m-font-display); font-style: italic;
    font-size: 28px; color: var(--m-gold);
  }
  .m-eph-body{
    padding-left: 32px;
    border-left: 1px solid var(--m-line-strong);
    position: relative;
  }
  .m-eph-body::before{
    content:''; position: absolute; left: -1px; top: 0;
    width: 3px; height: 56px;
    background: var(--m-gold);
  }
  .m-eph-tag{
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .26em; text-transform: uppercase;
    color: var(--m-gold);
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .m-eph-tag::before{
    content:''; width: 18px; height: 1px; background: var(--m-gold);
  }
  .m-eph-title{
    font-family: var(--m-font-display);
    font-weight: 350;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.1; letter-spacing: -.015em;
    color: var(--m-ink);
    margin: 0;
    text-wrap: balance;
  }
  .m-eph-text{
    margin-top: 16px;
    font-size: 16px; line-height: 1.6;
    color: var(--m-ink-2);
    max-width: 64ch;
  }
  .m-eph-foot{
    margin-top: 22px;
    display: flex; gap: 18px; flex-wrap: wrap;
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase;
    color: var(--m-muted);
  }
  .m-eph-foot strong{ color: var(--m-accent); font-weight: 500; }

  @media (max-width: 720px){
    .m-eph-grid{ grid-template-columns: 1fr; gap: 24px; }
    .m-eph-date{ position: static; display: flex; align-items: baseline; gap: 16px; }
    .m-eph-day{ font-size: 88px; }
    .m-eph-month, .m-eph-year{ margin-top: 0; }
    .m-eph-body{ padding-left: 22px; }
  }

  /* ── Links / tiny / buttons ─────────────── */
  .m-link{
    background: transparent; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--m-font-ui); font-size: 13px; font-weight: 500;
    color: var(--m-ink); padding: 8px 0;
    border-bottom: 1px solid transparent;
    transition: border-color .15s, color .15s;
  }
  .m-link:hover{ border-bottom-color: var(--m-accent); color: var(--m-accent); }
  .m-link-sm{
    color: var(--m-muted); text-decoration: none;
    font-size: 12px; border-bottom: 1px solid transparent; padding-bottom: 1px;
  }
  .m-link-sm:hover{ border-bottom-color: var(--m-line-strong); color: var(--m-ink); }

  .m-tiny-btn{
    background: transparent; border: 1px solid var(--m-line-strong);
    border-radius: 999px; padding: 6px 12px;
    font-family: var(--m-font-ui); font-size: 11.5px; color: var(--m-ink-2);
    cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s, color .15s, border-color .15s;
  }
  .m-tiny-btn:hover{ background: var(--m-ink); color: var(--m-bg); border-color: var(--m-ink); }

  .m-btn{
    background: var(--m-card); border: 1px solid var(--m-line-strong);
    padding: 14px 22px;
    font-family: var(--m-font-ui); font-size: 14px; font-weight: 500;
    color: var(--m-ink); cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: all .18s ease;
    border-radius: 0;
    min-height: 48px;
  }
  .m-btn:hover{ background: var(--m-bg-2); border-color: var(--m-accent); }
  .m-btn.primary{
    background: var(--m-accent); color: var(--m-bg); border-color: var(--m-accent);
  }
  .m-btn.primary:hover{ background: var(--m-accent-2); border-color: var(--m-accent-2); }
  .m-btn.gold{
    background: var(--m-gold); color: var(--m-accent-2); border-color: var(--m-gold);
  }
  .m-btn.gold:hover{ background: var(--m-gold-2); border-color: var(--m-gold-2); }

  /* ── Segmented ─────────────────────────── */
  .m-seg{
    display: inline-flex; align-items: center;
    background: var(--m-card);
    padding: 3px;
    border: 1px solid var(--m-line);
  }
  .m-seg button{
    border: none; background: transparent;
    padding: 7px 12px;
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--m-ink-2); cursor: pointer; font-weight: 500;
    transition: background .15s, color .15s;
    min-height: 36px;
  }
  .m-seg button.on{
    background: var(--m-accent); color: var(--m-bg);
  }

  /* ── Lang switch ──────────────────────── */
  .m-langs{
    display: inline-flex; padding: 3px;
    border: 1px solid var(--m-line-strong); border-radius: 999px;
    background: var(--m-card);
  }
  .m-langs button{
    border: none; background: transparent;
    padding: 6px 12px; border-radius: 999px;
    font-family: var(--m-font-mono);
    font-size: 11px; letter-spacing: .14em;
    color: var(--m-ink-2); cursor: pointer; font-weight: 500;
    transition: background .15s, color .15s;
    min-height: 32px;
  }
  .m-langs button.on{ background: var(--m-accent); color: var(--m-bg); }

  .m-icon-btn{
    width: 38px; height: 38px; border-radius: 999px;
    border: 1px solid var(--m-line-strong);
    background: var(--m-card); color: var(--m-ink-2); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 8px;
    transition: background .15s, color .15s;
  }
  .m-icon-btn:hover{ background: var(--m-accent); color: var(--m-bg); border-color: var(--m-accent); }

  /* ── Record button ─────────────────────── */
  .m-record{
    width: 96px; height: 96px; border-radius: 50%;
    border: 1px solid var(--m-line-strong);
    background: var(--m-card);
    color: var(--m-ink);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all .22s ease;
  }
  .m-record:hover{ background: var(--m-accent); color: var(--m-bg); border-color: var(--m-accent); }
  .m-record[data-active="true"]{
    background: var(--m-burgundy); color: #fff; border-color: var(--m-burgundy);
    box-shadow: 0 0 0 8px rgba(107,31,31,.10), 0 0 0 18px rgba(107,31,31,.05);
    animation: pulse 1.7s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 8px rgba(107,31,31,.10), 0 0 0 18px rgba(107,31,31,.05); }
    50%    { box-shadow: 0 0 0 14px rgba(107,31,31,.18), 0 0 0 26px rgba(107,31,31,.08); }
  }

  /* ── Pills ────────────────────────────── */
  .m-pill{
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px;
    background: var(--m-card); color: var(--m-ink-2);
    border: 1px solid var(--m-line-strong);
  }
  .m-pill.gold{ color: var(--m-gold); border-color: var(--m-gold); }

  /* ── Disclosure ─────────────────────── */
  .m-disclose{
    width: 100%;
    background: transparent; border: none;
    padding: 18px 0;
    border-top: 1px solid var(--m-line);
    border-bottom: 1px solid var(--m-line);
    display: flex; justify-content: space-between; align-items: center;
    cursor: pointer;
    font-family: var(--m-font-ui); font-size: 14.5px; font-weight: 500;
    color: var(--m-ink);
    min-height: 56px;
  }
  .m-disclose:hover{ color: var(--m-accent); }
  .m-disclose-icon{
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px;
    color: var(--m-gold);
    transition: transform .2s ease;
  }
  .m-disclose-icon[data-open="true"]{ transform: rotate(90deg); }

  /* ── Footer ──────────────────────────── */
  .m-footer{
    margin-top: 64px; padding-top: 28px;
    border-top: 1px solid var(--m-line);
    display: flex; justify-content: space-between; align-items: flex-end;
    flex-wrap: wrap; gap: 16px;
    font-family: var(--m-font-mono);
    font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--m-muted);
  }
  .m-footer .lemma{
    font-family: var(--m-font-display); font-style: italic;
    font-size: 24px; letter-spacing: -.005em; text-transform: none;
    color: var(--m-accent); margin-bottom: 8px;
  }
  .m-footer .lemma .g{ color: var(--m-gold); }

  /* ── Exam · rules grid ───────────────── */
  .m-exam-rules{
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  }
  .m-exam-rule{
    padding: 24px 22px;
    border-left: 1px solid var(--m-line);
  }
  .m-exam-rule:first-child{ border-left: none; }
  @media (max-width: 820px){
    .m-exam-rules{ grid-template-columns: repeat(2, 1fr); }
    .m-exam-rule{ border-left: 1px solid var(--m-line); }
    .m-exam-rule:nth-child(2n+1){ border-left: none; }
    .m-exam-rule:nth-child(n+3){ border-top: 1px solid var(--m-line); }
  }
  @media (max-width: 480px){
    .m-exam-rules{ grid-template-columns: 1fr; }
    .m-exam-rule{ border-left: none; }
    .m-exam-rule + .m-exam-rule{ border-top: 1px solid var(--m-line); }
  }

  /* ── Exam · review body (per-question detail) ─ */
  .m-exam-review-body{
    display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
  }
  .m-exam-review-model{
    border-left: 1px solid var(--m-line-strong);
    padding-left: 24px;
  }
  @media (max-width: 720px){
    .m-exam-review-body{ grid-template-columns: 1fr; gap: 0; }
    .m-exam-review-model{
      border-left: none; padding-left: 0;
      border-top: 1px dashed var(--m-line-strong);
      margin-top: 8px;
    }
  }
</style>
