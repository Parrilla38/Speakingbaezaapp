<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Speaking Trainer · Academia Baeza</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Schibsted+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#f1ece0;
    --paper-2:#e8e2d2;
    --paper-3:#dcd4be;
    --cream:#faf7ef;
    --ink:#14181a;
    --ink-2:#2b3230;
    --olive:#1a2a1f;
    --olive-2:#243527;
    --olive-3:#3a4d3e;
    --olive-soft:#6b7a64;
    --gold:#b8924a;
    --gold-2:#caa15a;
    --red:#7a1f1f;
    --line:rgba(20,24,26,.14);
    --line-strong:rgba(20,24,26,.32);

    --font-display: "Instrument Serif", "Times New Roman", serif;
    --font-ui: "Schibsted Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --font-mono: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family: var(--font-ui);
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01","ss02";
    overflow-x:hidden;
  }

  button{ font-family: inherit; }

  /* Paper texture */
  .paper-grain{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background-image:
      radial-gradient(rgba(20,24,26,.025) 1px, transparent 1px),
      radial-gradient(rgba(20,24,26,.018) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    mix-blend-mode: multiply;
    opacity:.7;
  }

  /* utility */
  .mono{ font-family: var(--font-mono); letter-spacing:.02em; }
  .serif{ font-family: var(--font-display); }
  .uppercase{ text-transform:uppercase; letter-spacing:.18em; }

  /* common */
  .container{ width:min(1320px, 100% - 56px); margin:0 auto; }
  @media (max-width: 720px){ .container{ width: calc(100% - 28px); } }

  /* Scrollbar in app */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  ::-webkit-scrollbar-thumb{ background: rgba(20,24,26,.18); border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background: rgba(20,24,26,.32); }

  /* Page transitions */
  .fade-enter{ animation: fadeIn .35s ease both; }
  @keyframes fadeIn{ from{opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }

  /* selection */
  ::selection{ background: var(--olive); color: var(--cream); }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>
<div class="paper-grain"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
